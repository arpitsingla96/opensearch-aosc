# MkDocs configuration for the AOSC plugin documentation site.
#
# Local preview:
#   pip install mkdocs-material pymdown-extensions mkdocs-drawio mike
#   mkdocs serve

site_name: AOSC - Automatic Online Schema Change
site_description: >-
  AOSC is an OpenSearch plugin for moving an index to a pre-created target
  while backfilling documents, replaying source operation history, and
  performing an alias cutover after a brief source write block.
site_author: Atlassian
site_url: https://atlassian-labs.github.io/opensearch-aosc/

repo_name: atlassian-labs/opensearch-aosc
repo_url: https://github.com/atlassian-labs/opensearch-aosc
edit_uri: edit/develop/docs/
docs_dir: docs
site_dir: site

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.prune
    - navigation.top
    - navigation.indexes
    - navigation.path
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
    - header.autohide
    - announce.dismiss
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra_css:
  - stylesheets/state-machine.css

extra_javascript:
  - javascripts/sidebar-toggle.js
  - javascripts/state-machine-viz.js
  - javascripts/mermaid-init.js

extra:
  generator: false
  version:
    provider: mike
    alias: true
  social: []

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - drawio

nav:
  - Home: index.md

  - Get Started:
      - get-started/index.md
      - What Is AOSC?: get-started/what-is-aosc.md
      - Your First Migration: get-started/your-first-migration.md

  - How-to Guides:
      - how-to/index.md
      - Install the Plugin: how-to/install-the-plugin.md
      - Plan a Migration: how-to/plan-a-migration.md
      - Change Shard Count: how-to/change-shard-count.md
      - Change Mappings or Settings: how-to/change-mappings-or-settings.md
      - Transform Documents: how-to/transform-documents.md
      - Cancel and Clean Up: how-to/cancel-and-clean-up.md

  - Operations:
      - operations/index.md
      - Monitor a Migration: operations/monitor-a-migration.md
      - "Runbook: Stuck Migration": operations/runbook-stuck-migration.md
      - Troubleshoot by Symptom: operations/troubleshoot-by-symptom.md

  - Reference:
      - reference/index.md
      - REST API: reference/rest-api.md
      - Compatibility: reference/compatibility.md
      - Configuration: reference/configuration.md
      - State Machine: reference/state-machine.md
      - Error Reference: reference/error-codes.md
      - Metrics: reference/metrics.md
      - Known Limitations: reference/known-limitations.md

  - Concepts:
      - concepts/index.md
      - Architecture Overview: concepts/architecture-overview.md
      - Correctness Model: concepts/correctness-model.md
      - Backpressure & Throttling: concepts/backpressure-and-throttling.md
      - HLD Deep Dive: concepts/hld-deep-dive.md
      - Comparison & Tradeoffs: concepts/comparison-and-tradeoffs.md

  - Contributing:
      - contributing/index.md
      - Dev Environment: contributing/dev-environment.md
      - Running Tests: contributing/running-tests.md
      - Code Organisation: contributing/code-organisation.md
      - Releases: contributing/releases.md
      - Extension Points: contributing/extensions.md
      - Release History: contributing/release-history.md
