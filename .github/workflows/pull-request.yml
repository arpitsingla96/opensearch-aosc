name: Pull Request

on:
  pull_request:
    branches:
      - develop
      - 'releases/**'
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pull-request-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  resolve:
    name: Resolve OpenSearch line
    runs-on: ubuntu-latest
    outputs:
      os_line: ${{ steps.line.outputs.os_line }}
    steps:
      - uses: actions/checkout@v6
      - id: line
        # For pull_request events the target (base) branch determines the line.
        run: echo "os_line=$(./scripts/resolve-os-line.sh "${GITHUB_BASE_REF}")" >> "$GITHUB_OUTPUT"

  validation:
    name: Run full CI
    needs: resolve
    uses: ./.github/workflows/components.yml
    with:
      os_line: ${{ needs.resolve.outputs.os_line }}
      include_docs: true
      artifact_retention_days: 7

  full_ci:
    name: Full CI
    needs: validation
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check full CI result
        run: |
          if [[ "${{ needs.validation.result }}" != "success" ]]; then
            echo "Full CI failed: ${{ needs.validation.result }}" >&2
            exit 1
          fi
