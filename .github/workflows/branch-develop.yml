name: "Branch: develop"

on:
  push:
    branches:
      - develop

permissions:
  contents: read

concurrency:
  group: branch-develop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve:
    name: Resolve OpenSearch line
    runs-on: ubuntu-latest
    outputs:
      os_line: ${{ steps.line.outputs.os_line }}
    steps:
      - uses: actions/checkout@v6
      - id: line
        run: echo "os_line=$(./scripts/resolve-os-line.sh "${GITHUB_REF_NAME}")" >> "$GITHUB_OUTPUT"

  validation:
    name: Run full CI
    needs: resolve
    uses: ./.github/workflows/components.yml
    with:
      os_line: ${{ needs.resolve.outputs.os_line }}
      include_docs: true
      artifact_retention_days: 7

  full_ci:
    name: Full CI
    needs: validation
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check full CI result
        run: |
          if [[ "${{ needs.validation.result }}" != "success" ]]; then
            echo "Full CI failed: ${{ needs.validation.result }}" >&2
            exit 1
          fi

  deploy_docs:
    name: Deploy develop docs
    needs: full_ci
    if: ${{ needs.full_ci.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: docs-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - name: Install docs dependencies
        run: npm ci
      - name: Deploy develop docs
        run: scripts/deploy-docs-version.sh --version develop --set-default
