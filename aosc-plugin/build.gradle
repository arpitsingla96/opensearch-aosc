            task.systemProperty k, v
        }
    }

    task.jvmArgs '-Xmx4g', '-Xms2g'

    task.testLogging {
        events 'started', 'passed', 'failed', 'skipped'
        showStandardStreams = true
    }
}

task scaleTest2Nodes(type: RestIntegTestTask) {
    description = 'Run scale validation tests on 2 co-located nodes'
    configureScaleTask(it)
}

testClusters.scaleTest2Nodes {
    testDistribution = "INTEG_TEST"
    numberOfNodes = 2
    plugin(project.tasks.bundlePlugin.archiveFile)
    jvmArgs '-Xmx2g', '-Xms2g'
}

task scaleTestDedicatedCM(type: RestIntegTestTask) {
    description = 'Run scale validation tests on 3 nodes (1 dedicated CM + 2 data)'
    configureScaleTask(it)
}

testClusters.scaleTestDedicatedCM {
    testDistribution = "INTEG_TEST"
    numberOfNodes = 3
    plugin(project.tasks.bundlePlugin.archiveFile)
    jvmArgs '-Xmx2g', '-Xms2g'
    // Node 0: dedicated cluster_manager (no data). Nodes 1-2: CM-eligible + data.
    // All nodes must be CM-eligible because testClusters auto-sets
    // cluster.initial_cluster_manager_nodes to all node names.
    nodes."scaleTestDedicatedCM-0".setting("node.roles", "[cluster_manager]")
    nodes."scaleTestDedicatedCM-1".setting("node.roles", "[cluster_manager, data, ingest]")
    nodes."scaleTestDedicatedCM-2".setting("node.roles", "[cluster_manager, data, ingest]")
}

task scaleTestDocker(type: Test) {
    description = 'Run scale validation tests against Docker cluster'
    configureScaleTask(it)
    dependsOn 'dockerUp'

    systemProperty 'tests.rest.cluster', 'localhost:9200'
    systemProperty 'tests.clustername', 'aosc-smoke-cluster'

    finalizedBy 'dockerDown'
}

// Unified entry point: ./gradlew scaleTest -Dcluster.topology=2n|cm|docker
def scaleTopology = System.getProperty('cluster.topology', '2n')
task scaleTest {
    description = "Run scale tests with selected topology (current: ${scaleTopology}). Use -Dcluster.topology=2n|cm|docker"
    group = 'scale'
    switch (scaleTopology) {
        case '2n':     dependsOn scaleTest2Nodes; break
        case 'cm':     dependsOn scaleTestDedicatedCM; break
        case 'docker': dependsOn scaleTestDocker; break
        default: throw new GradleException("Unknown cluster.topology '${scaleTopology}'. Use: 2n, cm, docker")
    }
}

testingConventions.enabled = false

// ---------------------------------------------------------------------------
// Lombok: OpenSearch's build-tools adds -proc:none unless -processor is
// explicitly specified. Override that so Lombok's annotation processor runs.
// ---------------------------------------------------------------------------
// Only enable Lombok's annotation processor for main and test source sets.
// The yamlRestTest source set does not use Lombok.
['compileJava', 'compileTestJava'].each { taskName ->
    tasks.named(taskName).configure {
        options.compilerArgs.removeAll { it == '-proc:none' }
        options.compilerArgs.addAll(['-processor', 'lombok.launch.AnnotationProcessorHider$AnnotationProcessor'])
    }
}

dependencies {
    // Jackson — version auto-resolved from OpenSearch's jackson-core (B041).
    implementation "com.fasterxml.jackson.core:jackson-databind:${resolvedJacksonVersion}"
    implementation "com.fasterxml.jackson.core:jackson-annotations:${resolvedJacksonVersion}"
    testImplementation "com.fasterxml.jackson.core:jackson-databind:${resolvedJacksonVersion}"
    testImplementation "com.fasterxml.jackson.core:jackson-annotations:${resolvedJacksonVersion}"

    // Lombok — compile-time only, not bundled in plugin zip
    compileOnly 'org.projectlombok:lombok:1.18.30'
    annotationProcessor 'org.projectlombok:lombok:1.18.30'
    testCompileOnly 'org.projectlombok:lombok:1.18.30'
    testAnnotationProcessor 'org.projectlombok:lombok:1.18.30'

    // Painless scripting engine needed for ScriptTransform integration tests
    testImplementation "org.opensearch.plugin:lang-painless:${opensearch_version}"
}

testClusters.integTest {
    testDistribution = "INTEG_TEST"

    // This installs our plugin into the testClusters
    plugin(project.tasks.bundlePlugin.archiveFile)
}

run {
    useCluster testClusters.integTest
}

// ---------------------------------------------------------------------------
// smokeTestDocker: REST smoke tests against a Docker cluster
// Uses the same src/smokeTest source set but runs against a real containerized
// 2-node cluster with the plugin installed via opensearch-plugin install.
// This profile has Painless (full distro), unlike INTEG_TEST profiles.
// Usage: ./gradlew smokeTestDocker
// ---------------------------------------------------------------------------

task dockerCopyPlugin(type: Copy) {
    description = 'Copy plugin zip to opensearch-docker/ for Docker build'
    dependsOn bundlePlugin
    from tasks.bundlePlugin.archiveFile
    into 'opensearch-docker'
    rename { 'opensearch-aosc.zip' }
}

// Detect docker compose command: v2 plugin ('docker compose') or v1 standalone ('docker-compose')
def dockerComposeCmd = {
    try {
        def result = ['docker', 'compose', 'version'].execute()
        result.waitFor()
        if (result.exitValue() == 0) return ['docker', 'compose']
    } catch (ignored) {}
    return ['docker-compose']
}()

def dockerComposeEnv = [
    OPENSEARCH_VERSION: opensearch_version.toString()
]

task dockerBuild(type: Exec) {
    description = 'Build the OpenSearch + AOSC Docker image'
    dependsOn dockerCopyPlugin
    workingDir 'opensearch-docker'
    environment dockerComposeEnv
    commandLine dockerComposeCmd + ['build']
}

task dockerUp(type: Exec) {
    description = 'Start the Docker cluster'
    dependsOn dockerBuild
    workingDir 'opensearch-docker'
    environment dockerComposeEnv
    commandLine dockerComposeCmd + ['up', '-d', '--wait']
}

// Profile 3: Docker cluster (full distro with Painless).
task smokeTestDocker(type: Test) {
    description = 'Run REST smoke tests against a Docker cluster with full distro (Painless included).'
    group = 'verification'
    configureSmokeTask(it)
    dependsOn dockerUp, compileSmokeTestJava
    systemProperty 'tests.rest.cluster', 'localhost:9200'
    systemProperty 'tests.cluster', 'localhost:9300'
    systemProperty 'tests.clustername', 'aosc-smoke-cluster'
    finalizedBy 'dockerDown'
}

// Unified entry point: ./gradlew smokeTest -Dcluster.topology=2n|cm|docker
def smokeTopology = System.getProperty('cluster.topology', '2n')
task smokeTest {
    description = "Run smoke tests with selected topology (current: ${smokeTopology}). Use -Dcluster.topology=2n|cm|docker"
    group = 'verification'
    switch (smokeTopology) {
        case '2n':     dependsOn smokeTest2Nodes; break
        case 'cm':     dependsOn smokeTestDedicatedCM; break
        case 'docker': dependsOn smokeTestDocker; break
        default: throw new GradleException("Unknown cluster.topology '${smokeTopology}'. Use: 2n, cm, docker")
    }
}

task dockerDown(type: Exec) {
    description = 'Stop and remove the Docker cluster'
    workingDir 'opensearch-docker'
    environment dockerComposeEnv
    commandLine dockerComposeCmd + ['down', '-v']
}

// updateVersion: Task to auto update version to the next development iteration
task updateVersion {
    onlyIf { System.getProperty('newVersion') }
    doLast {
        ext.newVersion = System.getProperty('newVersion')
        println "Setting version to ${newVersion}."
         // String tokenization to support -SNAPSHOT
        ant.replaceregexp(file:"${rootProject.projectDir}/build.gradle", match: '"opensearch.version", "\\d.*"', replace: '"opensearch.version", "' + newVersion.tokenize('-')[0] + '-SNAPSHOT"', flags:'g', byline:true)
    }
}
